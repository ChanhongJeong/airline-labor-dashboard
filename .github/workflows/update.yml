name: 물가상승률(CPI) 자동 갱신

on:
  schedule:
    # 매주 월요일 UTC 03:00 = KST 12:00 에 실행
    - cron: "0 3 * * 1"
  workflow_dispatch:  # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update-cpi:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: CPI 데이터 갱신 (World Bank API)
        run: python scripts/update_data.py

      - name: 변경사항 확인 및 커밋
        run: |
          if [ -z "$(git status --porcelain data.js)" ]; then
            echo "변경사항 없음 — 커밋 스킵"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          git commit -m "chore(data): World Bank CPI 자동 갱신 $(date -u +%Y-%m-%d)"
          git push
